name: Mrotok Activity

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  activity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update file
        run: |
          echo "Update $(date)" > IJOMROTOK

      - name: Commit changes
        run: |
          git config --global user.name "Jenderal92"
          git config --global user.email "Jenderal92@users.noreply.github.com"
          git add IJOMROTOK
          git commit -m "update activity $(date)" || echo "no change"

      - name: Push changes
        run: git push
