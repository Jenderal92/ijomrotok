name: Natural Activity

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  activity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate random commits
        run: |
          git config --global user.name "dev-activity"
          git config --global user.email "activity@github.com"

          COMMITS=$((RANDOM % 4 + 1))

          for i in $(seq 1 $COMMITS)
          do
            echo "Update $(date) $RANDOM" > ACTIVITY
            git add ACTIVITY
            git commit -m "dev update $(date) $RANDOM" || echo "no change"
            sleep $((RANDOM % 120))
          done

      - name: Push
        run: git push
